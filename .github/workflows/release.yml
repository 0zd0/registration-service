name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/ecr-push.yml
    with:
      aws_region: ${{ vars.AWS_REGION }}
      role_to_assume: ${{ vars.AWS_ROLE_ARN }}
      ecr_repository: ${{ vars.ECR_REPOSITORY }}
